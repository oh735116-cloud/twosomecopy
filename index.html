        </button>
        <button class="header-logo">A TWOSOME PLACE</button>
      </div>

    <main>
      <section id="first-section">
        <div class="page">
          <a href="#"><img src="샌드위치.jpg" alt="" /></a>
        </div>

        <span class="pagein">4/9</span>

        <div>

              <p>앱</p>
            </span>
            <span class="login-app">회원가입 / 로그인 하기</span>
          </button>
        </div>
      </section>
      <section>
        <div class="present">
          <p class="present-yo">투썸을 선물하세요!</p>
          <button class="present-more">더보기 ></button>
        </div>
        <nav class="money">
          <button class="mo">전체</button>
          <button class="mo">1만원미만</button>
          <button class="mo">1만원대</button>
          <button class="mo">2만원대</button>
          <button class="mo">3만원이상</button>
        </nav>
        <div>
          <ul class="menu-li">
            <li class="scs">
              <span
                ><a href="#"><img src="전체_스초생.jpg" alt="" /></a
              ></span>
              <span>스초생</span>
              <div>39,000원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전페_5만원.jpg" alt="" /></a
              ></span>
              <span>5만원권</span>
              <div>50,000원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_1만원.jpg" alt="" /></a
              ></span>
              <span>1만원권</span>
              <div>10,000원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_3만월.jpg" alt="" /></a
              ></span>
              <span>3만원권</span>
              <div>30,000원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_떠먹는.jpg" alt="" /></a
              ></span>
              <span>떠먹는 스초생 + 아메리카노 R</span>
              <div>11,900원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_망고생.jpg" alt="" /></a
              ></span>
              <span>망고생</span>
              <div>38,000원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_아메리카노.jpg" alt="" /></a
              ></span>
              <span>아메리카노 R</span>
              <div>4,700원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_아메+케익.jpg" alt="" /></a
              ></span>
              <span>생딸기ㅏ 생크림 케이크 피스 + 아메리카노 R2잔</span>
              <div>15,900원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_2만원.jpg" alt="" /></a
              ></span>
              <span>2만원권</span>
              <div>20,000원</div>
            </li>
            <li>
              <span
                ><a href="#"><img src="전체_떠먹스초+아메.jpg" alt="" /></a
              ></span>
              <span>떠먹는 스초생 + 떠먹는 티라미수 + 아메리카노 R2잔</span>
              <div>23,400원</div>
            </li>
          </ul>
        </div>
