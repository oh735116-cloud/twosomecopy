<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>twosomelogin</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="style_login.css">
</head>
<body>
    <header>
        <div class="home">
            <button class="back-home">
                <a href="#"><img src="https://mcdn.twosome.co.kr/resources/images/new_icon/ico_back.svg" alt=""></a>
            </button>
            <button class="back-home">
                <a href="#"><img src="https://mcdn.twosome.co.kr/resources/images/new_icon/ico_home.svg" alt=""></a>
            </button>
        </div>
        <h1 class="login-h1">로그인</h1>
    </header>
    <main>
        <div class="lgbox">
            <div class="main-content">
                <div class="two-title">
                <h2>
                    <span>A TOWSOME PLACE</span>
                </h2>
                </div>
                <form action="#">
                    <div class="id">
                        <span class="id-span">
                            <input class="id-span-input" type="text" placeholder="아이디 입력">
                            <button class="id-img"><img src="ico_reset2.jpg" alt=""></button>
                        </span>
                    </div>
                    <div class="id">
                        <span class="id-span">
                            <input class="id-span-input" type="password" placeholder="비밀번호 입력">
                            <button class="id-img">눈알</button>
                        </span>
                    </div>
                    <div class="ff">
                        <p class="fcfc">정보 보호를 위해 아이디, 비밀번호와 함께 자동 입력 방지 문자를 입력해 주세요.</p>
                        <div class="number">
                            <div><img src="로그인_숫자.jpg" alt="">
                            </div>
                            <button>새로고침</button>
                            <button>음성듣기</button>
                        </div>
                        <div>
                            <input type="text" placeholder="자동 입력 방지 문자 입력">
                        </div>
                    </div>
                    <div>
                        <div>
                            <button>로그인</button>
                        </div>
                    </div>
                </form>
                <div>
                    <ul>
                        <li>
                            <a href="#">아이디 찾기</a>
                        </li>
                        <li>
                            <a href="#">비밀번호 찾기</a>
                        </li>
                    </ul>
                </div>
                <div>
                    <button><img src="카카오로그인.jpg" alt=""></button>
                    <button><img src="애플로그인.jpg" alt=""></button>
                </div>
            </div>
            <div>
                <p>
                    <em>투썸하트</em>
                    " 앱이 처음이신가요? "
                </p>
                <a href="#">회원가입하기</a>
            </div>
        </div>
    </main>
</body>
</html>
